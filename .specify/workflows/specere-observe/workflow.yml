schema_version: "1.0"
workflow:
  id: "specere-observe"
  name: "SpecERE Repo-SLAM Observation Cycle"
  version: "0.1.0"
  author: "SpecERE"
  description: >
    Wraps the SpecKit specifyâ†’clarifyâ†’planâ†’tasksâ†’implement cycle with OTel GenAI
    spans (emitted via before_/after_ hooks) and a post-implement review-queue
    drain + human divergence adjudication gate. Only the gates are human-interactive;
    every other observation happens through hooks.

requires:
  speckit_version: ">=0.7.3"
  integrations:
    any: ["claude"]

inputs:
  spec:
    type: string
    required: true
    prompt: "Describe what you want to build"
  integration:
    type: string
    default: "claude"
    prompt: "Integration to use"

steps:
  - id: specify
    command: speckit.specify
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"

  - id: review-spec
    type: gate
    message: "Review the generated spec before clarification."
    options: [approve, reject]
    on_reject: abort

  - id: clarify
    command: speckit.clarify
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"

  - id: plan
    command: speckit.plan
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"

  - id: review-plan
    type: gate
    message: "Review the plan before generating tasks. (core_theory Â§4 prior-setting touchpoint)"
    options: [approve, reject]
    on_reject: abort

  - id: tasks
    command: speckit.tasks
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"

  - id: implement
    command: speckit.implement
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"

  - id: review-queue-check
    command: specere.review.check
    integration: "{{ inputs.integration }}"
    input:
      args: "post-implement scan"

  - id: divergence-adjudication
    type: gate
    message: >
      Review .specere/review-queue.md before closing the iteration.
      (core_theory Â§4 divergence-adjudication touchpoint â€” extend the harness,
      allowlist the surface, ignore, or reopen a spec.)
    options: [approve, reject]
    on_reject: abort
